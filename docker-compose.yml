services:
  browser-search-mcp:
    container_name: "browser-search-mcp"
    restart: unless-stopped
    build:
      context: .
    shm_size: "2gb"
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 2g
        reservations:
          cpus: "2.0"
          memory: 1g

    environment:
      # ── Most commonly changed ──────────────────────────────
      # Run the browser visibly (set to false if you don't need to watch it)
      HEADLESS: ${HEADLESS:-true}
      # Which engine for page ops (web_open_page, screenshots): cloakbrowser | chromium | lightpanda
      BROWSER_BACKEND: ${BROWSER_BACKEND:-cloakbrowser}
      # Starts VNC + noVNC so you can watch the browser in your browser
      ENABLE_VNC: ${ENABLE_VNC:-1}
      # Enable MCP over HTTP (Streamable HTTP) — needed for most MCP clients
      ENABLE_HTTP_MCP: ${ENABLE_HTTP_MCP:-1}
      MCP_API_PORT: ${MCP_API_PORT:-3000}                      # port for HTTP MCP
      # How long before a page operation times out (ms)
      BROWSER_OP_TIMEOUT_MS: ${BROWSER_OP_TIMEOUT_MS:-25000}
      # domcontentloaded | load | networkidle0 — how long to wait for a page
      NAV_WAIT_UNTIL: ${NAV_WAIT_UNTIL:-domcontentloaded}
      # Pre-launch the browser on server start (saves time on first request)
      PRELAUNCH_BROWSER: ${PRELAUNCH_BROWSER:-1}

      # ── Search engine routes ──────────────────────────────
      # Engines to pre-warm on startup (comma-separated)
      SEARCH_ROUTE_WARMUP_ENGINES: ${SEARCH_ROUTE_WARMUP_ENGINES:-duckduckgo_api,google_cb,google_lp,bing_lp,duckduckgo_cb}
      # Engines to fall back through if one fails (comma-separated)
      SEARCH_FALLBACK: ${SEARCH_FALLBACK:-duckduckgo_api,google_cb,google_lp,bing_lp,duckduckgo_cb,google_ch,duckduckgo_ch}
      # Cooldown before retrying a failed route (ms)
      SEARCH_ROUTE_CIRCUIT_OPEN_MS: ${SEARCH_ROUTE_CIRCUIT_OPEN_MS:-300000}
      SEARCH_KEEP_MIN_WORKING_WINDOWS: ${SEARCH_KEEP_MIN_WORKING_WINDOWS:-2}
      SEARCH_MAX_WORKING_WINDOWS: ${SEARCH_MAX_WORKING_WINDOWS:-4}

      # ── Page loading behaviour ─────────────────────────────
      OPEN_PAGE_MAX_PARALLEL: ${OPEN_PAGE_MAX_PARALLEL:-4}     # pages opened at once
      MAX_CONCURRENT_PAGE_OPS: ${MAX_CONCURRENT_PAGE_OPS:-30}  # total concurrent ops
      # ms between keystrokes (0 = no delay) — helps with bot detection
      HUMAN_TYPING_DELAY: ${HUMAN_TYPING_DELAY:-0}

      # ── Browser config ────────────────────────────────────
      CHROME_PATH: ${CHROME_PATH:-/usr/bin/chromium}
      CHROME_USER_DATA_DIR: ${CHROME_USER_DATA_DIR:-/data/chrome}
      CHROME_PROFILE_DIR: ${CHROME_PROFILE_DIR:-Default}
      STARTUP_URL: ${STARTUP_URL:-about:blank}
      LIGHTPANDA_PORT: ${LIGHTPANDA_PORT:-9222}

      # ── VNC / noVNC ───────────────────────────────────────
      VNC_PORT: ${VNC_PORT:-5900}
      NOVNC_PORT: ${NOVNC_PORT:-7900}

      # ── HTTP health ───────────────────────────────────────
      ENABLE_HTTP_HEALTH: ${ENABLE_HTTP_HEALTH:-1}             # /health endpoint
      MCP_API_HOST: ${MCP_API_HOST:-http://localhost}

      # ── Screenshots ───────────────────────────────────────
      ENABLE_SCREENSHOT_DOWNLOAD_LINK: ${ENABLE_SCREENSHOT_DOWNLOAD_LINK:-0}
      # mount a volume and point this path to save screenshots to disk
      ENABLE_SCREENSHOT_PATH: ${ENABLE_SCREENSHOT_PATH:-}

      # ── Reliability ───────────────────────────────────────
      ENABLE_HANG_RESTART: ${ENABLE_HANG_RESTART:-0}           # auto-restart if browser hangs
      HANG_RESTART_TIMEOUT_MS: ${HANG_RESTART_TIMEOUT_MS:-120000}
    volumes:
      - .:/app
      - /tmp/screenshots:/app/screenshots
      - chrome_profile_data:/data/chrome
    ports:
      # VNC (5900) + noVNC web UI (7900) — lets you watch the browser in real time.
      # Uncomment both if you need to see what the browser is doing:
      # - "${NOVNC_PORT:-7900}:${NOVNC_PORT:-7900}"
      # - "${VNC_PORT:-5900}:${VNC_PORT:-5900}"
      # MCP port (3000) — where the server listens for tool calls
      - "${MCP_API_PORT:-3000}:${MCP_API_PORT:-3000}"
    stdin_open: true
    tty: true

volumes:
  chrome_profile_data:
    name: browser-search-mcp_chrome_profile_data
