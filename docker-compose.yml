services:
  browser-search-mcp:
    restart: unless-stopped
    build:
      context: .
    shm_size: "2gb"
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 2g
        reservations:
          cpus: "2.0"
          memory: 1g
    environment:
      HEADLESS: ${HEADLESS:-true}
      ENABLE_VNC: ${ENABLE_VNC:-1}
      CHROME_USER_DATA_DIR: ${CHROME_USER_DATA_DIR:-/data/chrome}
      CHROME_PROFILE_DIR: ${CHROME_PROFILE_DIR:-Default}
      CHROME_PATH: ${CHROME_PATH:-/usr/bin/chromium}
      VNC_PORT: ${VNC_PORT:-5900}
      NOVNC_PORT: ${NOVNC_PORT:-7900}
      ENABLE_HTTP_HEALTH: ${ENABLE_HTTP_HEALTH:-1}
      ENABLE_HTTP_MCP: ${ENABLE_HTTP_MCP:-1}
      MCP_API_PORT: ${MCP_API_PORT:-3000}
      MCP_API_HOST: ${MCP_API_HOST:-http://localhost}
      ENABLE_SCREENSHOT_DOWNLOAD_LINK: ${ENABLE_SCREENSHOT_DOWNLOAD_LINK:-0}
      ENABLE_SCREENSHOT_PATH: ${ENABLE_SCREENSHOT_PATH:-}
      BROWSER_OP_TIMEOUT_MS: ${BROWSER_OP_TIMEOUT_MS:-25000}
      ENABLE_HANG_RESTART: ${ENABLE_HANG_RESTART:-0}
      HANG_RESTART_TIMEOUT_MS: ${HANG_RESTART_TIMEOUT_MS:-120000}
      NAV_WAIT_UNTIL: ${NAV_WAIT_UNTIL:-domcontentloaded}
      PRELAUNCH_BROWSER: ${PRELAUNCH_BROWSER:-1}
      STARTUP_URL: ${STARTUP_URL:-about:blank}
      SEARCH_ENGINES: ${SEARCH_ENGINES:-duckduckgo,bing,mojeek,google,duckduckgo_chromium}
      SEARCH_ROUTE_CIRCUIT_OPEN_MS: ${SEARCH_ROUTE_CIRCUIT_OPEN_MS:-300000}
      SEARCH_KEEP_MIN_WORKING_WINDOWS: ${SEARCH_KEEP_MIN_WORKING_WINDOWS:-2}
      SEARCH_MAX_WORKING_WINDOWS: ${SEARCH_MAX_WORKING_WINDOWS:-4}
      OPEN_PAGE_MAX_PARALLEL: ${OPEN_PAGE_MAX_PARALLEL:-4}
      MAX_CONCURRENT_PAGE_OPS: ${MAX_CONCURRENT_PAGE_OPS:-30}
      HUMAN_TYPING_DELAY: ${HUMAN_TYPING_DELAY:-0}
      LIGHTPANDA_PORT: ${LIGHTPANDA_PORT:-9222}
      BROWSER_BACKEND: ${BROWSER_BACKEND:-lightpanda}
    volumes:
      - .:/app
      - /app/node_modules
      - /tmp/screenshots:/app/screenshots
      - chrome_profile_data:/data/chrome
    ports:
      - "${NOVNC_PORT:-7900}:${NOVNC_PORT:-7900}"
      - "${VNC_PORT:-5900}:${VNC_PORT:-5900}"
      - "${MCP_API_PORT:-3000}:${MCP_API_PORT:-3000}"
    stdin_open: true
    tty: true

volumes:
  chrome_profile_data:
    name: browser-search-mcp_chrome_profile_data
